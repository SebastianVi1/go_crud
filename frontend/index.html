<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion de alumnos</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <h1>Nombre del proyecto</h1>
        <h2>Andre Sebastian Villarreal Heredia</h2>
    </header>

    <main>
        <div class="navigation_buttons_container">
            <div class="navigation_btn">
                <button class="btn_add">Agregar</button>
                <button class="btn_show">Mostrar</button>
                <button class="btn_modify">Actualizar</button>
            </div>
        </div>
        <section class="inputs_form">
            <form action="">
                <label for="name">Nombre:</label>
                <input type="text" id="name" name="name">
                <label for="age">Edad:</label>
                <input type="number" id="age" name="age">
                <label for="career">Carrera:</label>
                <input type="text" id="career" name="career">
                <label for="average">Promedio:</label>
                <input type="number" id="average" name="average">
                <button type="submit">Agregar</button>
            </form>
        </section>
    </main>
</body>


<script src="script.js"></script>

</html>
